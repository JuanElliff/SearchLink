spring.application.name=searchlink

# MongoDB — usa variable de entorno si está presente, localhost en caso contrario
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/searchlink}

# Puerto del servidor
server.port=${PORT:8080}

# ─── JWT ───────────────────────────────────────────────────────────────────────
# Secret de firma HS256. El default es SOLO para desarrollo local.
# En producción DEBE proveerse por variable de entorno SEARCHLINK_JWT_SECRET
# (>= 32 bytes / 256 bits para HS256). Nunca commitear un secret real.
searchlink.jwt.secret=${SEARCHLINK_JWT_SECRET:dev-secret-cambiar-en-produccion-min-32-bytes-1234567890}
# Vigencia del access token en milisegundos (24h). Sin refresh token por alcance.
searchlink.jwt.expiration-ms=${SEARCHLINK_JWT_EXPIRATION_MS:86400000}

# ─── Firebase / FCM ──────────────────────────────────────────────────────────
# Ruta al serviceAccountKey.json de la cuenta de servicio. Si está vacía o el
# archivo no existe, FCM queda DESHABILITADO: la app arranca igual, sin push
# (ver FirebaseConfig). El JSON NUNCA se commitea (ver .gitignore).
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}
