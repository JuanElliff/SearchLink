# Configuración SOLO para tests.
spring.application.name=searchlink-test

# MongoDB embebido (flapdoodle). No se setea spring.data.mongodb.uri a propósito:
# la autoconfiguración de flapdoodle provee un MongoConnectionDetails que apunta a la
# instancia embebida en un puerto aleatorio. Descarga un mongod local la primera vez.
de.flapdoodle.mongodb.embedded.version=7.0.14

# Crea automáticamente los índices declarados por anotaciones (@GeoSpatialIndexed,
# @Indexed) en el Mongo embebido. Necesario para que la query $nearSphere de despacho
# push tenga su índice 2dsphere sobre usuarios.ubicacion_precargada. En producción los
# índices los crea mongo/init/01_init.js, no la app.
spring.data.mongodb.auto-index-creation=true

# Secret JWT de test (>= 32 bytes). No es el de producción.
searchlink.jwt.secret=test-secret-solo-para-tests-con-mas-de-32-bytes-1234567890
searchlink.jwt.expiration-ms=86400000
