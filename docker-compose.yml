services:

  mongodb:
    image: mongo:7
    container_name: searchlink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - searchlink-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: searchlink-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/searchlink
      - PORT=8080
    volumes:
      # Fotos subidas: persisten entre recreaciones del contenedor. El WORKDIR del
      # runtime es /app (ver Dockerfile) y la carpeta default de uploads es relativa.
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - searchlink-net
    restart: unless-stopped

volumes:
  mongo-data:
  uploads-data:

networks:
  searchlink-net:
    driver: bridge
